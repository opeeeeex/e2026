
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр задач v3.7</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Marck+Script&display=swap" rel="stylesheet">
    <style>
        /* CSS СТРИГО СОХРАНЕН СОГЛАСНО ИНСТРУКЦИИ */
        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #FFDAB9 0%, #E6E6FA 100%) no-repeat fixed; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .app-container { width: 95%; max-width: 650px; padding: 25px; margin: 20px; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(20px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 8px 32px rgba(0,0,0,0.1); }
        h2 { color: #444; text-align: center; margin-bottom: 20px; }
        .class-section { background: rgba(255,255,255,0.4); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .class-title { font-weight: 600; color: #9370DB; display: block; margin-bottom: 8px; }
        .topic-list { list-style: none; padding: 0; margin: 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .topic-item { background: #fff; padding: 6px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .topic-item:hover { border-color: #9370DB; transform: translateY(-2px); }
        .filter-box { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .filter-title { font-weight: 600; margin-bottom: 10px; display: block; font-size: 14px; }
        .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .check-item { display: flex; align-items: center; cursor: pointer; font-size: 13px; }
        .check-item input { display: none; }
        .custom-check { width: 18px; height: 18px; border: 2px solid #9370DB; border-radius: 5px; margin-right: 8px; display: flex; align-items: center; justify-content: center; background: #fff; }
        .check-item input:checked + .custom-check { background: #9370DB; }
        .check-item input:checked + .custom-check::after { content: '✓'; color: white; font-size: 12px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .ui-btn { padding: 12px; border: none; border-radius: 12px; background: #fff; font-weight: 600; cursor: pointer; transition: 0.2s; color: #444; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ui-btn:hover { background: #fdfdfd; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .full-width { grid-column: span 2; }
        .teacher-view { background: rgba(255, 255, 255, 0.5); border-radius: 15px; padding: 15px; max-height: 350px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.5); }
        .variant-preview-label { font-weight: 600; font-size: 12px; color: #9370DB; margin: 10px 0 5px 0; display: block; }
        .preview-task { font-size: 13px; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .preview-ans { font-family: 'Marck Script', cursive; color: #1a1a7a; font-size: 14px; display: block; margin-top: 2px; }

        #print-area { display: none; }

        @media print {
            @page { size: A4 portrait; margin: 0mm !important; }
            html, body { height: 100%; margin: 0 !important; padding: 0 !important; overflow: hidden; background: #fff !important; }
            .app-container { display: none !important; }
            #print-area { display: block !important; position: absolute; top: 0; left: 0; width: 210mm; height: 297mm; }
            .a4-page { width: 210mm; height: 297mm; padding: 8mm 15mm; box-sizing: border-box; display: flex; flex-direction: column; }
            .card { width: 100%; height: 138mm; border: 1.2pt solid #000; margin-bottom: 5mm; padding: 5mm 10mm; box-sizing: border-box; position: relative; display: flex; flex-direction: column; }
            .card-header { display: flex; justify-content: space-between; font-size: 11pt; margin-bottom: 2mm; border-bottom: 0.8pt solid #eee; padding-bottom: 1mm; }
            .task { margin-bottom: 3mm; flex: 1; display: flex; flex-direction: column; justify-content: flex-start; }
            .task-text { font-size: 10pt; line-height: 1.15; margin-bottom: 1.5mm; font-weight: 600; text-align: justify; }
            .solution-area { margin-top: auto; }
            .line { border-bottom: 0.5pt solid #aaa; height: 8.5mm; position: relative; width: 100%; }
            .empty-line { border-bottom: 0.5pt dashed #ccc; }
            .label { font-size: 9pt; color: #000; position: absolute; left: 0; bottom: 1mm; font-weight: 400; }
            .ans-text { font-family: 'Marck Script', cursive; font-size: 18pt; color: #1a1a7a; position: absolute; left: 5px; bottom: -2px; white-space: nowrap; }

</head>
<body>

<div class="app-container">
    <div style="font-size: 12px; margin-bottom: 10px; color: #666; cursor: pointer;" onclick="location.reload()">🏠 Главная</div>
    <h2>Задачи: 1 класс</h2>

    <div class="class-section">
        <span class="class-title">СОДЕРЖАНИЕ</span>
        <ul class="topic-list">
            <li class="topic-item" onclick="selectSingle('sum')">➕ Сумма</li>
            <li class="topic-item" onclick="selectSingle('diff')">➖ Остаток</li>
            <li class="topic-item" onclick="selectSingle('comp')">⚖️ Сравнение</li>
            <li class="topic-item" onclick="selectSingle('incdec')">📈 Больше/Меньше</li>
            <li class="topic-item" onclick="selectSingle('unknown')">🔍 Слагаемое</li>
        </ul>
    </div>

    <div class="filter-box">
        <span class="filter-title">Темы в работе:</span>
        <div class="checkbox-grid" id="topics-filter">
            <label class="check-item"><input type="checkbox" value="sum" checked onchange="gen()"><div class="custom-check"></div>Нахождение суммы</label>
            <label class="check-item"><input type="checkbox" value="diff" onchange="gen()"><div class="custom-check"></div>Нахождение остатка</label>
            <label class="check-item"><input type="checkbox" value="comp" onchange="gen()"><div class="custom-check"></div>Разностное сравнение</label>
            <label class="check-item"><input type="checkbox" value="incdec" onchange="gen()"><div class="custom-check"></div>Больше/Меньше на...</label>
            <label class="check-item"><input type="checkbox" value="unknown" onchange="gen()"><div class="custom-check"></div>Неизвестное слагаемое</label>
        </div>
        <span class="filter-title">Сложность:</span>
        <div class="checkbox-grid">
            <label class="check-item"><input type="radio" name="steps" value="1" checked onchange="gen()"><div class="custom-check"></div>В 1 действие</label>
            <label class="check-item"><input type="radio" name="steps" value="2" onchange="gen()"><div class="custom-check"></div>В 2 действия</label>
            <label class="check-item"><input type="radio" name="steps" value="any" onchange="gen()"><div class="custom-check"></div>Любые</label>
        </div>
    </div>

    <div class="controls">
        <button class="ui-btn full-width" onclick="gen()">✨ Генерация</button>
        <button class="ui-btn" onclick="prnt(false)">📄 Карточки</button>
        <button class="ui-btn" onclick="prnt(true)">🔑 Ответы</button>
    </div>

    <div class="teacher-view">
        <h3 id="view-title" style="font-size: 14px; margin: 0;">Предварительный просмотр</h3>
        <div id="dashboard"></div>
    </div>
</div>

<div id="print-area"></div>

<script>

    let v1Tasks = [];
    let v2Tasks = [];
    let currentId = null;

    function selectSingle(type) {
        document.querySelectorAll('#topics-filter input').forEach(i => i.checked = false);
        const check = document.querySelector(`input[value="${type}"]`);
        if(check) check.checked = true;
        gen();
    }

    function gen() {
        currentId = Math.floor(1000 + Math.random() * 9000);
        const selTypes = Array.from(document.querySelectorAll('#topics-filter input:checked')).map(i => i.value);
        const stpFilter = document.querySelector('input[name="steps"]:checked').value;
        
        let pool = database.filter(t => selTypes.includes(t.type));
        if (stpFilter !== 'any') pool = pool.filter(t => t.steps == stpFilter);
        
        if (pool.length < 6) {
            document.getElementById('dashboard').innerHTML = '<p style="font-size:12px;color:red;">Выберите больше тем для генерации.</p>';
            return;
        }

        let shuffled = [...pool].sort(() => Math.random() - 0.5);
        v1Tasks = []; v2Tasks = [];
        
        // Набираем Вариант 1
        for(let i=0; i<3; i++) {
            v1Tasks.push(shuffled.pop());
        }

        // Набираем Вариант 2 с той же сложностью (количество действий)
        v1Tasks.forEach(taskV1 => {
            let matchIdx = shuffled.findIndex(item => item.steps === taskV1.steps);
            if(matchIdx !== -1) v2Tasks.push(shuffled.splice(matchIdx, 1)[0]);
            else v2Tasks.push(shuffled.pop());
        });

        renderDashboard();
    }

    function renderDashboard() {
        let html = '<span class="variant-preview-label">Вариант 1</span>';
        v1Tasks.forEach((t, i) => {
            html += `<div class="preview-task"><b>${i+1}.</b> ${t.q} <span class="preview-ans">ответ: ${t.a}</span></div>`;
        });
        html += '<span class="variant-preview-label">Вариант 2</span>';
        v2Tasks.forEach((t, i) => {
            html += `<div class="preview-task"><b>${i+1}.</b> ${t.q} <span class="preview-ans">ответ: ${t.a}</span></div>`;
        });
        document.getElementById('dashboard').innerHTML = html;
        document.getElementById('view-title').innerText = `Задание №${currentId}`;
    }

            html += `<div class="card">
                <div class="card-header"><span>ФИ: ____________________</span><span>${today}</span></div>`;
            tasks.forEach((task, i) => {
                html += `
                <div class="task">
                    <div class="task-text">${i + 1}. ${task.q}</div>
                    <div class="solution-area">
                        <div class="line empty-line"><span class="ans-text">${showAns ? (task.s[0] || '') : ''}</span></div>
                        <div class="line empty-line"><span class="ans-text">${showAns ? (task.s[1] || '') : ''}</span></div>
                        <div class="line"><span class="label">Ответ:</span><span class="ans-text full-ans">${showAns ? task.a : ''}</span></div>
                    </div>
                </div>`;
            });
            html += `<div class="footer-info">Вариант ${vIdx + 1} | ID: ${currentId}</div></div>`;
        });
        document.getElementById('print-area').innerHTML = html + `</div>`;
        window.print();
    }

    window.onload = function() {
        gen();
    };
</script>
</body>
</html>
